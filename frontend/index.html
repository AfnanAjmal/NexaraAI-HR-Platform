<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexaraAI Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f0f1a; }
    #messages { scrollbar-width: thin; scrollbar-color: #6c63ff #1a1a2e; }
    .msg-ai   { background: #1e1e3a; border-left: 3px solid #6c63ff; }
    .msg-user { background: #2a1a3e; border-left: 3px solid #a78bfa; }
    .typing span {
      display: inline-block; width: 8px; height: 8px;
      background: #6c63ff; border-radius: 50%; margin: 0 2px;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-8px)} }
    #hr-panel { transition: all 0.3s ease; }
  </style>
</head>
<body class="text-white min-h-screen flex flex-col">

  <!-- Header -->
  <header class="flex items-center justify-between px-6 py-4 border-b border-purple-900/40 bg-[#0f0f1a]/90 backdrop-blur sticky top-0 z-10">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-purple-600 flex items-center justify-center font-bold text-sm">N</div>
      <span class="font-semibold text-lg tracking-tight">NexaraAI Assistant</span>
    </div>
    <div class="flex items-center gap-3">
      <span id="mode-badge" class="text-xs px-3 py-1 rounded-full bg-purple-900/60 text-purple-300 font-medium">NORMAL MODE</span>
      <a href="/hr/dashboard" class="text-xs text-purple-400 hover:text-purple-200 transition">HR Dashboard →</a>
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden max-w-4xl mx-auto w-full">

    <!-- HR Panel (hidden until HR mode) -->
    <div id="hr-panel" class="hidden w-56 border-r border-purple-900/30 bg-[#0d0d1f] p-4 flex-shrink-0">
      <p class="text-xs text-purple-400 font-semibold uppercase tracking-widest mb-4">HR Tools</p>
      <a href="/hr/dashboard" class="block text-sm text-purple-200 hover:text-white py-2 px-3 rounded-lg hover:bg-purple-800/30 transition mb-1">
        📋 New Candidate
      </a>
      <a href="/hr/dashboard#pipeline" class="block text-sm text-purple-200 hover:text-white py-2 px-3 rounded-lg hover:bg-purple-800/30 transition">
        📊 Pipeline
      </a>
    </div>

    <!-- Chat area -->
    <div class="flex-1 flex flex-col overflow-hidden">
      <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-4">
        <!-- Welcome -->
        <div class="msg-ai rounded-xl p-4 text-sm text-gray-200 leading-relaxed max-w-2xl">
          👋 Hi! I'm the NexaraAI assistant. Ask me anything about our company, services, or policies.<br>
          <span class="text-purple-400 text-xs mt-1 block">(HR staff: type <code class="bg-black/30 px-1 rounded">#hr:1234</code> to access HR mode)</span>
        </div>
      </div>

      <!-- Input -->
      <div class="border-t border-purple-900/30 bg-[#0d0d1f] p-4">
        <form id="chat-form" class="flex gap-3">
          <input
            id="user-input"
            type="text"
            placeholder="Type your message..."
            autocomplete="off"
            class="flex-1 bg-[#1a1a2e] border border-purple-900/50 rounded-xl px-4 py-3 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-purple-500 transition"
          />
          <button
            type="submit"
            class="px-5 py-3 bg-purple-600 hover:bg-purple-500 rounded-xl text-sm font-medium transition flex items-center gap-2"
          >Send</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    const SESSION_ID = 'session-' + Math.random().toString(36).slice(2);
    const messages   = document.getElementById('messages');
    const form       = document.getElementById('chat-form');
    const input      = document.getElementById('user-input');
    const modeBadge  = document.getElementById('mode-badge');
    const hrPanel    = document.getElementById('hr-panel');

    function addMsg(text, role) {
      const div = document.createElement('div');
      div.className = (role === 'user' ? 'msg-user' : 'msg-ai') +
        ' rounded-xl p-4 text-sm text-gray-200 leading-relaxed max-w-2xl whitespace-pre-wrap';
      if (role === 'user') {
        div.className += ' ml-auto';
        div.textContent = text;
      } else {
        div.innerHTML = text.replace(/\n/g, '<br>');
      }
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'msg-ai rounded-xl p-4 typing max-w-xs';
      div.id = 'typing-indicator';
      div.innerHTML = '<span></span><span></span><span></span>';
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('typing-indicator');
      if (t) t.remove();
    }

    function setMode(mode) {
      if (mode === 'hr') {
        modeBadge.textContent = '🔴 HR MODE';
        modeBadge.className = 'text-xs px-3 py-1 rounded-full bg-red-900/60 text-red-300 font-medium';
        hrPanel.classList.remove('hidden');
        hrPanel.classList.add('flex', 'flex-col');
      } else {
        modeBadge.textContent = 'NORMAL MODE';
        modeBadge.className = 'text-xs px-3 py-1 rounded-full bg-purple-900/60 text-purple-300 font-medium';
        hrPanel.classList.add('hidden');
        hrPanel.classList.remove('flex', 'flex-col');
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = input.value.trim();
      if (!msg) return;

      input.value = '';
      addMsg(msg, 'user');
      showTyping();

      try {
        const res  = await fetch('/chat', {
          method : 'POST',
          headers: { 'Content-Type': 'application/json' },
          body   : JSON.stringify({ session_id: SESSION_ID, message: msg }),
        });
        const data = await res.json();
        removeTyping();
        addMsg(data.response, 'ai');
        setMode(data.mode);
      } catch (err) {
        removeTyping();
        addMsg('⚠️ Something went wrong. Please try again.', 'ai');
      }
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) form.dispatchEvent(new Event('submit'));
    });
  </script>
</body>
</html>
