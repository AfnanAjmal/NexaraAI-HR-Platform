<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HR Dashboard — NexaraAI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f0f1a; }
    .tab-active { background: #6c63ff; color: #fff; }
    .tab-inactive { background: #1a1a2e; color: #a78bfa; }
    .card { background: #1a1a2e; border: 1px solid #2d2d5e; }
    .status-pending    { background: #3b1f00; color: #fbbf24; }
    .status-interviewed{ background: #0f2d4a; color: #60a5fa; }
    .status-selected   { background: #0d2e1a; color: #34d399; }
    .status-rejected   { background: #2e0d0d; color: #f87171; }
    #drop-zone { border: 2px dashed #6c63ff; }
    #drop-zone.drag-over { background: #1a1a3e; border-color: #a78bfa; }
  </style>
</head>
<body class="text-white min-h-screen">

  <!-- Header -->
  <header class="flex items-center justify-between px-8 py-5 border-b border-purple-900/30 bg-[#0d0d1f]">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-xl bg-purple-600 flex items-center justify-center font-bold">N</div>
      <div>
        <p class="font-semibold text-base">NexaraAI</p>
        <p class="text-xs text-purple-400">HR Dashboard</p>
      </div>
    </div>
    <a href="/" class="text-sm text-purple-400 hover:text-white transition">← Back to Chat</a>
  </header>

  <div class="max-w-5xl mx-auto px-6 py-8">

    <!-- Tabs -->
    <div class="flex gap-2 mb-8">
      <button onclick="showTab('new')" id="tab-new" class="tab-active px-5 py-2 rounded-lg text-sm font-medium transition">
        📋 New Candidate
      </button>
      <button onclick="showTab('pipeline')" id="tab-pipeline" class="tab-inactive px-5 py-2 rounded-lg text-sm font-medium transition">
        📊 Candidates Pipeline
      </button>
    </div>

    <!-- ── TAB: NEW CANDIDATE ── -->
    <div id="tab-new-content">
      <div class="card rounded-2xl p-8 max-w-2xl">
        <h2 class="text-xl font-semibold mb-1">Add New Candidate</h2>
        <p class="text-sm text-gray-400 mb-6">Upload resume and provide job description to generate interview plan and send invite.</p>

        <form id="new-candidate-form" class="space-y-5">
          <!-- Email -->
          <div>
            <label class="block text-xs text-purple-300 font-medium mb-1 uppercase tracking-wide">Candidate Email</label>
            <input id="c-email" type="email" required placeholder="candidate@email.com"
              class="w-full bg-[#0f0f1a] border border-purple-900/50 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-purple-500 transition" />
          </div>

          <!-- Resume upload -->
          <div>
            <label class="block text-xs text-purple-300 font-medium mb-1 uppercase tracking-wide">Resume (PDF)</label>
            <div id="drop-zone" class="rounded-xl p-6 text-center cursor-pointer transition"
              onclick="document.getElementById('resume-file').click()"
              ondragover="event.preventDefault();this.classList.add('drag-over')"
              ondragleave="this.classList.remove('drag-over')"
              ondrop="handleDrop(event)">
              <p class="text-sm text-gray-400" id="drop-label">Click to upload or drag & drop PDF</p>
              <input id="resume-file" type="file" accept=".pdf" class="hidden" onchange="handleFileSelect(event)" />
            </div>
          </div>

          <!-- JD -->
          <div>
            <label class="block text-xs text-purple-300 font-medium mb-1 uppercase tracking-wide">Job Description</label>
            <textarea id="c-jd" rows="6" required placeholder="Paste the full job description here..."
              class="w-full bg-[#0f0f1a] border border-purple-900/50 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-purple-500 transition resize-none"></textarea>
          </div>

          <button type="submit"
            class="w-full py-3 bg-purple-600 hover:bg-purple-500 rounded-xl font-medium text-sm transition flex items-center justify-center gap-2">
            <span id="btn-text">🚀 Process Candidate & Send Invite</span>
            <span id="btn-spinner" class="hidden animate-spin">⏳</span>
          </button>
        </form>

        <!-- Result -->
        <div id="result-box" class="hidden mt-6 p-4 bg-green-900/30 border border-green-700/40 rounded-xl text-sm">
          <p class="font-medium text-green-300 mb-2">✅ Candidate processed!</p>
          <p id="result-name" class="text-gray-300"></p>
          <p id="result-link" class="text-purple-300 mt-1 break-all"></p>
        </div>

        <div id="error-box" class="hidden mt-6 p-4 bg-red-900/30 border border-red-700/40 rounded-xl text-sm text-red-300"></div>
      </div>
    </div>

    <!-- ── TAB: PIPELINE ── -->
    <div id="tab-pipeline-content" class="hidden">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-semibold">Candidates Pipeline</h2>
        <button onclick="loadPipeline()" class="text-sm text-purple-400 hover:text-white transition">↻ Refresh</button>
      </div>
      <div id="pipeline-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
        <!-- Populated by JS -->
      </div>
    </div>

  </div>

  <script>
    let selectedFile = null;

    function handleFileSelect(e) {
      const file = e.target.files[0];
      if (file) { selectedFile = file; document.getElementById('drop-label').textContent = `📄 ${file.name}`; }
    }
    function handleDrop(e) {
      e.preventDefault();
      document.getElementById('drop-zone').classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file && file.type === 'application/pdf') {
        selectedFile = file;
        document.getElementById('drop-label').textContent = `📄 ${file.name}`;
      }
    }

    function showTab(name) {
      ['new', 'pipeline'].forEach(t => {
        document.getElementById(`tab-${t}`).className =
          t === name ? 'tab-active px-5 py-2 rounded-lg text-sm font-medium transition'
                     : 'tab-inactive px-5 py-2 rounded-lg text-sm font-medium transition';
        document.getElementById(`tab-${t}-content`).classList.toggle('hidden', t !== name);
      });
      if (name === 'pipeline') loadPipeline();
    }

    document.getElementById('new-candidate-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!selectedFile) { alert('Please upload a resume PDF.'); return; }

      const btnText    = document.getElementById('btn-text');
      const btnSpinner = document.getElementById('btn-spinner');
      btnText.textContent = 'Processing...';
      btnSpinner.classList.remove('hidden');
      document.getElementById('result-box').classList.add('hidden');
      document.getElementById('error-box').classList.add('hidden');

      const form = new FormData();
      form.append('email',   document.getElementById('c-email').value);
      form.append('jd_text', document.getElementById('c-jd').value);
      form.append('resume',  selectedFile);

      try {
        const res  = await fetch('/hr/new-candidate', { method: 'POST', body: form });
        const data = await res.json();

        if (!res.ok) throw new Error(data.detail || 'Server error');

        document.getElementById('result-name').textContent = `Candidate: ${data.name}`;
        document.getElementById('result-link').textContent = `Interview link: ${data.interview_link}`;
        document.getElementById('result-box').classList.remove('hidden');
      } catch (err) {
        document.getElementById('error-box').textContent = '❌ ' + err.message;
        document.getElementById('error-box').classList.remove('hidden');
      } finally {
        btnText.textContent = '🚀 Process Candidate & Send Invite';
        btnSpinner.classList.add('hidden');
      }
    });

    async function loadPipeline() {
      const grid = document.getElementById('pipeline-grid');
      grid.innerHTML = '<p class="text-gray-500 text-sm col-span-4">Loading...</p>';

      try {
        const res  = await fetch('/hr/candidates');
        const data = await res.json();

        const statuses = ['pending', 'interviewed', 'selected', 'rejected'];
        const labels   = { pending: '⏳ Pending', interviewed: '🎤 Interviewed', selected: '✅ Selected', rejected: '❌ Rejected' };
        const colors   = { pending: 'status-pending', interviewed: 'status-interviewed', selected: 'status-selected', rejected: 'status-rejected' };

        grid.innerHTML = statuses.map(s => `
          <div class="card rounded-2xl p-4">
            <p class="text-xs font-semibold uppercase tracking-widest mb-3 ${colors[s]} px-2 py-1 rounded-lg inline-block">${labels[s]}</p>
            <p class="text-xs text-gray-500 mb-3">${data[s].length} candidate${data[s].length !== 1 ? 's' : ''}</p>
            ${data[s].length === 0
              ? '<p class="text-xs text-gray-600 italic">None</p>'
              : data[s].map(c => `
                  <div class="bg-[#0f0f1a] rounded-xl p-3 mb-2">
                    <p class="text-sm font-medium">${c.name}</p>
                    <p class="text-xs text-gray-400">${c.email}</p>
                    ${c.score != null ? `<p class="text-xs text-purple-300 mt-1">Score: ${c.score}/10</p>` : ''}
                  </div>`).join('')}
          </div>`).join('');
      } catch {
        grid.innerHTML = '<p class="text-red-400 text-sm col-span-4">Failed to load pipeline.</p>';
      }
    }

    // Auto-open pipeline tab if hash is #pipeline
    if (location.hash === '#pipeline') showTab('pipeline');
  </script>
</body>
</html>
